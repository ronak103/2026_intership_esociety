{% load static %}

<!-- Logo Section -->
<div class="sidebar-header">
    <div class="sidebar-logo">
        <i class="fas fa-building"></i>
        <span class="sidebar-logo-text">SocietySync</span>
    </div>
    <span class="sidebar-role-badge">Admin</span>
</div>

<!-- Navigation -->
<nav class="sidebar-nav">
    <ul class="sidebar-menu">

        <li class="sidebar-menu-item {% if request.resolver_match.url_name == 'admin_dashboard' %}active{% endif %}">
            <a href="{% url 'admin_dashboard' %}" class="sidebar-link">
                <i class="fas fa-tachometer-alt sidebar-icon"></i>
                <span class="sidebar-link-text">Dashboard</span>
            </a>
        </li>

        <li class="sidebar-menu-item {% if request.resolver_match.url_name == 'admin_residents' %}active{% endif %}">
            <a href="{% url 'admin_residents' %}" class="sidebar-link">
                <i class="fas fa-users sidebar-icon"></i>
                <span class="sidebar-link-text">Residents</span>
            </a>
        </li>

        <li class="sidebar-menu-item {% if request.resolver_match.url_name == 'admin_complaints' %}active{% endif %}">
            <a href="{% url 'admin_complaints' %}" class="sidebar-link">
                <i class="fas fa-exclamation-circle sidebar-icon"></i>
                <span class="sidebar-link-text">Complaints</span>
            </a>
        </li>

        <li class="sidebar-menu-item {% if request.resolver_match.url_name == 'admin_finance' %}active{% endif %}">
            <a href="{% url 'admin_finance' %}" class="sidebar-link">
                <i class="fas fa-wallet sidebar-icon"></i>
                <span class="sidebar-link-text">Finance</span>
            </a>
        </li>

        <li class="sidebar-menu-item {% if request.resolver_match.url_name == 'admin_community' %}active{% endif %}">
            <a href="{% url 'admin_community' %}" class="sidebar-link">
                <i class="fas fa-people-group sidebar-icon"></i>
                <span class="sidebar-link-text">Community</span>
            </a>
        </li>

        <li class="sidebar-menu-item {% if request.resolver_match.url_name == 'admin_visitor_logs' %}active{% endif %}">
            <a href="{% url 'admin_visitor_logs' %}" class="sidebar-link">
                <i class="fas fa-clipboard-list sidebar-icon"></i>
                <span class="sidebar-link-text">Visitor Logs</span>
            </a>
        </li>

        <li class="sidebar-menu-item {% if request.resolver_match.url_name == 'admin_settings' %}active{% endif %}">
            <a href="{% url 'admin_settings' %}" class="sidebar-link">
                <i class="fas fa-cog sidebar-icon"></i>
                <span class="sidebar-link-text">Settings</span>
            </a>
        </li>

    </ul>
</nav>

<!-- User Section -->
<div class="sidebar-footer">
    <div class="sidebar-user">
        <div class="sidebar-user-avatar">
            <i class="fas fa-user-lock"></i>
        </div>
        <div class="sidebar-user-info">
            <span class="sidebar-user-name">
                {% if user.first_name %}{{ user.first_name }} {{ user.last_name }}
                {% else %}{{ user.email }}{% endif %}
            </span>
            <span class="sidebar-user-email">{{ user.email }}</span>
        </div>
    </div>
    <a href="{% url 'logout' %}" class="sidebar-signout">
        <i class="fas fa-sign-out-alt sidebar-icon"></i>
        <span class="sidebar-link-text">Sign Out</span>
    </a>
</div>
