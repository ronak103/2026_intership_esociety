{% load static %}

    

    <!-- Logo Section -->
        <div class="sidebar-header">
            <div class="sidebar-logo">
                <i class="fas fa-building"></i>
                <span class="sidebar-logo-text">eSociety</span>
            </div>
            <span class="sidebar-role-badge resident">Resident</span>
        </div>

    <!-- Navigation -->
        <nav class="sidebar-nav">
            <ul class="sidebar-menu">
                <li class="sidebar-menu-item {% if request.resolver_match.url_name == 'resident_dashboard' %}active{% endif %}">
                    <a href="#" class="sidebar-link">
                        <i class="fas fa-tachometer-alt sidebar-icon"></i>
                        <span class="sidebar-link-text">My Dashboard</span>
                    </a>
                </li>
                <li class="sidebar-menu-item {% if request.resolver_match.url_name == 'my_complaints' %}active{% endif %}">
                    <a href="#" class="sidebar-link">
                        <i class="fas fa-exclamation-circle sidebar-icon"></i>
                        <span class="sidebar-link-text">My Complaints</span>
                    </a>
                </li>
                <li class="sidebar-menu-item {% if request.resolver_match.url_name == 'facility_booking' %}active{% endif %}">
                    <a href="#" class="sidebar-link">
                        <i class="fas fa-calendar-check sidebar-icon"></i>
                        <span class="sidebar-link-text">Facility Booking</span>
                    </a>
                </li>
                <li class="sidebar-menu-item {% if request.resolver_match.url_name == 'visitor_pass' %}active{% endif %}">
                    <a href="#" class="sidebar-link">
                        <i class="fas fa-id-badge sidebar-icon"></i>
                        <span class="sidebar-link-text">Visitor Pass</span>
                    </a>
                </li>
                <li class="sidebar-menu-item {% if request.resolver_match.url_name == 'community' %}active{% endif %}">
                    <a href="#" class="sidebar-link">
                        <i class="fas fa-people-group sidebar-icon"></i>
                        <span class="sidebar-link-text">Community</span>
                    </a>
                </li>
            </ul>
        </nav>

    <!-- User Section -->
        <div class="sidebar-footer">
            <div class="sidebar-user">
                <div class="sidebar-user-avatar">
                    <i class="fas fa-user"></i>
                </div>
                <div class="sidebar-user-info">
                    <span class="sidebar-user-name">
                        {% if user.first_name %}
                            {{ user.first_name }} {{ user.last_name }}
                        {% else %}
                            {{ user.email }}
                        {% endif %}
                    </span>
                    <span class="sidebar-user-email">
                        {{ user.email }}
                    </span>
                </div>
            </div>
            <a href="{% url 'logout' %}" class="sidebar-signout">
                <i class="fas fa-sign-out-alt sidebar-icon"></i>
                <span class="sidebar-link-text">Sign Out</span>
            </a>
        </div>
