{% load static %}


<!-- Logo Section -->
<div class="sidebar-header">
    <div class="sidebar-logo">
        <i class="fas fa-building"></i>
        <span class="sidebar-logo-text">eSociety</span>
    </div>
    <span class="sidebar-role-badge security">Security</span>
</div>

<!-- Navigation -->
<nav class="sidebar-nav">
    <ul class="sidebar-menu">
        <li class="sidebar-menu-item {% if request.resolver_match.url_name == 'control_center' %}active{% endif %}">
            <a href="#" class="sidebar-link">
                <i class="fas fa-satellite-dish sidebar-icon"></i>
                <span class="sidebar-link-text">Control Center</span>
            </a>
        </li>
        <li class="sidebar-menu-item {% if request.resolver_match.url_name == 'check_in' %}active{% endif %}">
            <a href="#" class="sidebar-link">
                <i class="fas fa-right-to-bracket sidebar-icon"></i>
                <span class="sidebar-link-text">Check-In</span>
            </a>
        </li>
        <li class="sidebar-menu-item {% if request.resolver_match.url_name == 'visitor_log' %}active{% endif %}">
            <a href="#" class="sidebar-link">
                <i class="fas fa-clipboard-list sidebar-icon"></i>
                <span class="sidebar-link-text">Visitor Log</span>
            </a>
        </li>
        <li class="sidebar-menu-item {% if request.resolver_match.url_name == 'emergency' %}active{% endif %}">
            <a href="#" class="sidebar-link">
                <i class="fas fa-triangle-exclamation sidebar-icon"></i>
                <span class="sidebar-link-text">Emergency</span>
            </a>
        </li>
    </ul>
</nav>

<!-- User Section -->
<div class="sidebar-footer">
    <div class="sidebar-user">
        <div class="sidebar-user-avatar">
            <i class="fas fa-user-lock"></i>
        </div>
        <div class="sidebar-user-info">
            <span class="sidebar-user-name">{{ user.get_full_name|default:user.email }}</span>
            <span class="sidebar-user-email">{{ user.email }}</span>
        </div>
    </div>
    <a href="{% url 'logout' %}" class="sidebar-signout">
        <i class="fas fa-sign-out-alt sidebar-icon"></i>
        <span class="sidebar-link-text">Sign Out</span>
    </a>
</div>
